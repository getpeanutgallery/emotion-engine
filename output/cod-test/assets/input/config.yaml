name: COD Test Pipeline (Phase 3 only)
description: Run only Phase 3 report scripts using existing Phase 1/2 artifacts in output/cod-test
version: '1.0'
asset:
  inputPath: examples/videos/emotion-tests/cod.mp4
  outputDir: output/cod-test
gather_context: []
process: []
report:
  - server/scripts/report/metrics.cjs
  - server/scripts/report/recommendation.cjs
  - server/scripts/report/emotional-analysis.cjs
  - server/scripts/report/summary.cjs
  - server/scripts/report/final-report.cjs
settings:
  chunk_duration: 8
  max_chunks: 100
  api_request_delay: 500
  ffmpeg:
    audio:
      loglevel: error
      codec: pcm_s16le
      sample_rate_hz: 16000
      channels: 1
      container: wav
    video:
      compress:
        vcodec: libx264
        preset: fast
        max_width: 1280
        fps: 24
        audio_codec: aac
        audio_bitrate: 128k
        size_headroom_ratio: 0.9
      compress_aggressive:
        vcodec: libx264
        preset: slow
        fps: 24
        audio_codec: aac
        audio_bitrate: 96k
        vf: scale='min(1280,iw)':-1:force_original_aspect_ratio=decrease
        maxrate_multiplier: 1.2
        bufsize_multiplier: 2
        size_headroom_ratio: 0.95
debug:
  captureRaw: true
recovery:
  deterministic:
    maxAttemptsPerFailure: 2
    maxRepeatedStrategyUsesPerFailure: 1
  ai:
    enabled: true
    lane: structured-output-repair
    adapter: openrouter
    model: google/gemini-3.1-pro-preview
    temperature: 0
    timeoutMs: 45000
    attempts:
      maxPerFailure: 1
      maxPerScriptRun: 1
      maxPerPipelineRun: 3
    budgets:
      maxInputTokens: 12000
      maxOutputTokens: 2000
      maxTotalTokens: 14000
      maxCostUsd: 0.25
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-3.1-flash-lite-preview
  music:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-3.1-flash-lite-preview
  video:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-3.1-pro-preview
  recommendation:
    retry:
      maxAttempts: 3
      backoffMs: 0
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-3.1-pro-preview
          params:
            max_tokens: 25000
            thinking:
              level: low

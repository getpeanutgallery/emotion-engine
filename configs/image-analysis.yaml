# Image Analysis Pipeline
# Analyze static images (no dialogue or music)

name: "Image Analysis Pipeline"
description: "Analyze static images (no dialogue or music)"
version: "1.0"

# Asset configuration (self-contained - no CLI args needed)
asset:
  inputPath: ".cache/images/sample.png"
  outputDir: "output/image-test"

# AI provider configuration (git-safe - secrets injected via env vars)
ai:
  provider: openrouter
  model: qwen/qwen-3.5-397b-a17b

# No context gathering for images
gather_context: []

process:
  sequential:
    - script: scripts/process/image-frames.cjs
      toolPath: tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "personas/impatient-teenager.md"
        goalPath: "goals/image-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom
            - excitement

report:
  - scripts/report/evaluation.cjs
  - scripts/report/graphs.cjs

# Global settings
settings:
  api_request_delay: 1000

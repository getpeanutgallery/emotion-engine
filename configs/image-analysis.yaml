# Image Analysis Pipeline
# Analyze static images (no dialogue or music)
#
# NOTE:
# The original "image-frames" and "graphs" scripts referenced here do not exist
# in this repo today. This config is kept as a placeholder until image-specific
# scripts are implemented.

name: "Image Analysis Pipeline"
description: "Placeholder config (image scripts not implemented in this repo yet)"
version: "1.0"

# Asset configuration (self-contained - no CLI args needed)
asset:
  inputPath: ".cache/images/sample.png"
  outputDir: "output/image-test"

# AI provider configuration (git-safe - secrets injected via env vars)
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b
  music:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b
  video:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b

gather_context: []
process: []

# Minimal report so this config remains runnable
report:
  - server/scripts/report/evaluation.cjs

settings:
  api_request_delay: 1000

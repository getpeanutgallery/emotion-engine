# Quick Test Pipeline Configuration
# Minimal pipeline for testing the Emotion Engine v8.0 scripts

name: "Quick Test Pipeline"
description: "Minimal pipeline for testing (1 process script only, 2 chunks max)"
version: "1.0"

# Asset configuration
asset:
  inputPath: ".cache/videos/test-video.mp4"
  outputDir: "output/quick-test"

# Skip context gathering for speed (or enable for full test)
gather_context: []
# gather_context:
#   - scripts/get-context/get-dialogue.cjs
#   - scripts/get-context/get-music.cjs

# Process with video-chunks (limited to 2 chunks for fast testing)
process:
  - scripts/process/video-chunks.cjs

# Generate evaluation report
report:
  - scripts/report/evaluation.cjs

# Settings for quick testing
settings:
  chunk_duration: 8
  max_chunks: 2  # Only 2 chunks for fast testing
  api_request_delay: 500

# Tool variables (paths must be absolute or relative to workspace)
tool_variables:
  soulPath: "/home/derrick/.openclaw/workspace/projects/opentruth/emotion-engine/personas/souls/impatient-teenager/1.0.0/SOUL.md"
  goalPath: "/home/derrick/.openclaw/workspace/projects/opentruth/emotion-engine/personas/goals/video-ad-evaluation/1.0.0/GOAL.md"
  variables:
    lenses:
      - patience
      - boredom
      - excitement

# AI provider configuration (API key injected via environment)
ai:
  provider: openrouter
  model: qwen/qwen-3.5-397b-a17b
  # apiKey: injected via AI_API_KEY environment variable

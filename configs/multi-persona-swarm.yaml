# Multi-Persona Swarm Analysis
# Same video analyzed by 3 different personas in parallel

name: "Multi-Persona Swarm Analysis"
description: "Same video analyzed by 3 different personas simultaneously"
version: "1.0"

# Asset configuration (self-contained - no CLI args needed)
asset:
  inputPath: "examples/videos/emotion-tests/cod.mp4"
  outputDir: "output/swarm-test"

# AI provider configuration (git-safe - secrets injected via env vars)
ai:
  provider: openrouter
  model: qwen/qwen-3.5-397b-a17b

# Phase 1: Gather context from video
gather_context:
  - scripts/get-context/get-dialogue.cjs
  - scripts/get-context/get-music.cjs

# Phase 2: Process video (PARALLEL)
# All 3 personas analyze the same video simultaneously
# Each receives base input only, outputs are merged after all complete
process:
  parallel:
    - script: scripts/process/video-chunks.cjs
      toolPath: tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "cast/impatient-teenager/SOUL.md"
        goalPath: "goals/video-ad-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom
    - script: scripts/process/video-chunks.cjs
      toolPath: tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "cast/skeptical-cfo/SOUL.md"
        goalPath: "goals/video-ad-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom
            - skepticism
    - script: scripts/process/video-chunks.cjs
      toolPath: tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "cast/optimistic-gen-z/SOUL.md"
        goalPath: "goals/video-ad-evaluation.md"
        variables:
          lenses:
            - excitement
            - fomo
            - joy

# Phase 3: Generate reports
report:
  - scripts/report/evaluation.cjs
  - scripts/report/graphs.cjs

# Global settings
settings:
  chunk_duration: 8          # seconds per chunk
  max_chunks: 4              # limit chunks for testing
  api_request_delay: 1000    # milliseconds between API calls

# Use Case: Compare how different personas react to the same content
# Useful for:
# - Testing content against multiple audience archetypes
# - Getting diverse perspectives on the same video
# - A/B testing persona responses

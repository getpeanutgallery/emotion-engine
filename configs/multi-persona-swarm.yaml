# Multi-Persona Swarm Analysis
# Same video analyzed by 3 different personas in parallel

name: "Multi-Persona Swarm Analysis"
description: "Same video analyzed by 3 different personas simultaneously"
version: "1.0"

# Asset configuration (self-contained - no CLI args needed)
asset:
  inputPath: "examples/videos/emotion-tests/cod.mp4"
  outputDir: "output/swarm-test"

# AI provider configuration (git-safe - secrets injected via env vars)
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  music:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  video:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b

gather_context:
  - server/scripts/get-context/get-dialogue.cjs
  - server/scripts/get-context/get-music.cjs

# Phase 2: Process video (PARALLEL)
process:
  parallel:
    - script: server/scripts/process/video-chunks.cjs
      toolPath: ../tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "../cast/impatient-teenager/SOUL.md"
        goalPath: "../goals/video-ad-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom
    - script: server/scripts/process/video-chunks.cjs
      toolPath: ../tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "../cast/skeptical-cfo/SOUL.md"
        goalPath: "../goals/video-ad-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom
            - skepticism
    - script: server/scripts/process/video-chunks.cjs
      toolPath: ../tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "../cast/optimistic-gen-z/SOUL.md"
        goalPath: "../goals/video-ad-evaluation.md"
        variables:
          lenses:
            - excitement
            - fomo
            - joy

# Phase 3: Generate report
report:
  - server/scripts/report/evaluation.cjs

# Global settings
settings:
  chunk_duration: 8          # seconds per chunk
  max_chunks: 4              # limit chunks for testing
  api_request_delay: 1000    # milliseconds between API calls

name: Multi-Persona Swarm Analysis
description: Same video analyzed by 3 different personas simultaneously
version: '1.0'
asset:
  inputPath: examples/videos/emotion-tests/cod.mp4
  outputDir: output/swarm-test
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  music:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  video:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b
gather_context:
  - server/scripts/get-context/get-dialogue.cjs
  - server/scripts/get-context/get-music.cjs
process:
  parallel:
    - script: server/scripts/process/video-chunks.cjs
      toolPath: ../tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: ../cast/impatient-teenager/SOUL.md
        goalPath: ../goals/video-ad-evaluation.md
        variables:
          lenses:
            - patience
            - boredom
    - script: server/scripts/process/video-chunks.cjs
      toolPath: ../tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: ../cast/skeptical-cfo/SOUL.md
        goalPath: ../goals/video-ad-evaluation.md
        variables:
          lenses:
            - patience
            - boredom
            - skepticism
    - script: server/scripts/process/video-chunks.cjs
      toolPath: ../tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: ../cast/optimistic-gen-z/SOUL.md
        goalPath: ../goals/video-ad-evaluation.md
        variables:
          lenses:
            - excitement
            - fomo
            - joy
report:
  - server/scripts/report/evaluation.cjs
settings:
  chunk_duration: 8
  max_chunks: 4
  api_request_delay: 1000
  ffmpeg:
    audio:
      loglevel: error
      codec: pcm_s16le
      sample_rate_hz: 16000
      channels: 1
      container: wav
    video:
      compress:
        vcodec: libx264
        preset: fast
        max_width: 1280
        fps: 24
        audio_codec: aac
        audio_bitrate: 128k
        size_headroom_ratio: 0.9
      compress_aggressive:
        vcodec: libx264
        preset: slow
        fps: 24
        audio_codec: aac
        audio_bitrate: 96k
        vf: scale='min(1280,iw)':-1:force_original_aspect_ratio=decrease
        maxrate_multiplier: 1.2
        bufsize_multiplier: 2
        size_headroom_ratio: 0.95

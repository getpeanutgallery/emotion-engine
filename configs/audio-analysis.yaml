# Audio Analysis Pipeline
# Analyze audio files (podcasts, music, etc.)
#
# NOTE:
# This config is currently a minimal, runnable pipeline (transcription + report).
# The older audio-segmentation process script referenced here previously does not
# exist in this repo.

name: "Audio Analysis Pipeline"
description: "Analyze audio files (podcasts, music, etc.)"
version: "1.0"

# Asset configuration (self-contained - no CLI args needed)
asset:
  inputPath: ".cache/audio/podcast.mp3"
  outputDir: "output/audio-test"

# AI provider configuration (git-safe - secrets injected via env vars)
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  music:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  video:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b

gather_context:
  - server/scripts/get-context/get-dialogue.cjs

# No persona-based processing for now
process: []

report:
  - server/scripts/report/evaluation.cjs

# Global settings
settings:
  api_request_delay: 1000

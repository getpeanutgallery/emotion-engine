# Audio Analysis Pipeline
# Analyze audio files (podcasts, music, etc.)

name: "Audio Analysis Pipeline"
description: "Analyze audio files (podcasts, music, etc.)"
version: "1.0"

# Asset configuration (self-contained - no CLI args needed)
asset:
  inputPath: ".cache/audio/podcast.mp3"
  outputDir: "output/audio-test"

# AI provider configuration (git-safe - secrets injected via env vars)
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  music:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  video:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b

gather_context:
  - scripts/get-context/get-dialogue.cjs

process:
  sequential:
    - script: scripts/process/audio-segments.cjs
      toolPath: tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "cast/impatient-teenager/SOUL.md"
        goalPath: "goals/audio-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom

report:
  - scripts/report/evaluation.cjs

# Global settings
settings:
  segment_duration: 30
  api_request_delay: 1000

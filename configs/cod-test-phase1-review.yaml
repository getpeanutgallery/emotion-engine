name: COD Test Pipeline (Phase 1 review only)
description: Run only Phase 1 gather-context scripts so dialogue and music artifacts can be reviewed after ee-tad
version: '1.0'
asset:
  inputPath: examples/videos/emotion-tests/cod.mp4
  outputDir: output/cod-test-phase1-review

gather_context:
  - server/scripts/get-context/get-dialogue.cjs
  - server/scripts/get-context/get-music.cjs

process: []
report: []

settings:
  chunk_duration: 8
  max_chunks: 100
  api_request_delay: 500
  retry_strategy:
    type: exponential-backoff
    config:
      maxRetries: 3
      initialDelayMs: 1000
      maxDelayMs: 10000
      exponentialBase: 2
      jitter: true
  ffmpeg:
    audio:
      loglevel: error
      codec: libmp3lame
      bitrate: 192k
      sample_rate_hz: 44100
      channels: 2
      container: mp3
    video:
      compress:
        vcodec: libx264
        preset: fast
        max_width: 1280
        fps: 24
        audio_codec: aac
        audio_bitrate: 128k
        size_headroom_ratio: 0.9
      compress_aggressive:
        vcodec: libx264
        preset: slow
        fps: 24
        audio_codec: aac
        audio_bitrate: 96k
        vf: scale='min(1280,iw)':-1:force_original_aspect_ratio=decrease
        maxrate_multiplier: 1.2
        bufsize_multiplier: 2
        size_headroom_ratio: 0.95

debug:
  captureRaw: true

recovery:
  deterministic:
    maxAttemptsPerFailure: 2
    maxRepeatedStrategyUsesPerFailure: 1
  ai:
    enabled: true
    lane: structured-output-repair
    adapter: openrouter
    model: google/gemini-3.1-pro-preview
    temperature: 0
    timeoutMs: 45000
    attempts:
      maxPerFailure: 1
      maxPerScriptRun: 1
      maxPerPipelineRun: 3
    budgets:
      maxInputTokens: 12000
      maxOutputTokens: 2000
      maxTotalTokens: 14000
      maxCostUsd: 0.25

tool_variables:
  soulPath: ../cast/impatient-teenager/SOUL.md
  goalPath: ../goals/video-ad-evaluation.md
  file_transfer: base64
  maxFileSize: 10485760
  chunk_strategy:
    type: duration-based
    config:
      chunkDuration: 5
    split:
      enabled: true
      max_splits: 3
      split_factor: 2
  variables:
    lenses:
      - patience
      - boredom
      - excitement

ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-3.1-flash-lite-preview
          params:
            max_tokens: 25000
            thinking:
              level: low
      - adapter:
          name: openrouter
          model: openai/gpt-audio
          params:
            max_tokens: 25000
            thinking:
              level: low
      - adapter:
          name: openrouter
          model: openai/gpt-audio-mini
          params:
            max_tokens: 25000
            thinking:
              level: low
      - adapter:
          name: openrouter
          model: mistralai/voxtral-small-24b-2507
          params:
            max_tokens: 25000
            thinking:
              level: low
  music:
    analysisWindowSeconds: 30
    targets:
      - adapter:

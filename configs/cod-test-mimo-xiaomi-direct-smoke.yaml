name: COD Test MiMo Xiaomi Direct Smoke
description: Narrow cod-test Xiaomi-direct whole-video MiMo smoke lane using the staged public S3 video URL
version: '1.0'

asset:
  inputPath: examples/videos/emotion-tests/cod.mp4
  outputDir: output/cod-test-mimo-xiaomi-direct-smoke
  media:
    refs:
      source_video:
        kind: video
        source:
          path: examples/videos/emotion-tests/cod.mp4
        staged:
          url: https://gambit-games-tests.s3.us-east-1.amazonaws.com/peanut-gallery/cod-720p-h264-mp3-optimized.mp4
          urlType: public
        delivery:
          preferredMode: url
          allowedModes:
            - url
          allowFallback: false
        metadata:
          mimeType: video/mp4

gather_context: []

process:
  - server/scripts/process/whole-video-mimo.cjs

report: []

settings:
  api_request_delay: 250
  ffmpeg:
    audio:
      loglevel: error
      codec: libmp3lame
      bitrate: 192k
      sample_rate_hz: 44100
      channels: 2
      container: mp3
    video:
      compress:
        vcodec: libx264
        preset: fast
        max_width: 1280
        fps: 24
        audio_codec: aac
        audio_bitrate: 128k
        size_headroom_ratio: 0.9
      compress_aggressive:
        vcodec: libx264
        preset: slow
        fps: 24
        audio_codec: aac
        audio_bitrate: 96k
        vf: scale='min(1280,iw)':-1:force_original_aspect_ratio=decrease
        maxrate_multiplier: 1.2
        bufsize_multiplier: 2
        size_headroom_ratio: 0.95

debug:
  captureRaw: true

recovery:
  deterministic:
    maxAttemptsPerFailure: 1
    maxRepeatedStrategyUsesPerFailure: 0

tool_variables:
  soulPath: ../cast/impatient-teenager/SOUL.md
  goalPath: ../goals/video-ad-evaluation.md
  variables:
    lenses:
      - patience
      - boredom
      - excitement

ai:
  dialogue:
    targets:
      - adapter:
          name: xiaomi
          model: mimo-v2-omni
          params:
            max_tokens: 1000
            timeoutMs: 90000
            thinking:
              level: low
  music:
    targets:
      - adapter:
          name: xiaomi
          model: mimo-v2-omni
          params:
            max_tokens: 1000
            timeoutMs: 90000
            thinking:
              level: low
  video:
    retry:
      maxAttempts: 1
      backoffMs: 0
    inputRefs:
      - source_video
    targets:
      - adapter:
          name: xiaomi
          model: mimo-v2-omni
          params:
            max_tokens: 4000
            timeoutMs: 180000
            temperature: 0.2
            fps: 2
            media_resolution: default

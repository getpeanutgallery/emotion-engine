name: Raw Analysis Pipeline
description: Run analysis and output raw JSON (no context gathering, no report)
version: '1.0'
asset:
  inputPath: examples/videos/emotion-tests/cod.mp4
  outputDir: output/raw-test
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b
  music:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b
  video:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b
gather_context: []
process:
  sequential:
    - script: server/scripts/process/video-chunks.cjs
      toolPath: ../tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: ../cast/impatient-teenager/SOUL.md
        goalPath: ../goals/video-ad-evaluation.md
        variables:
          lenses:
            - patience
            - boredom
            - excitement
report: []
settings:
  chunk_duration: 8
  max_chunks: 4
  api_request_delay: 1000
  ffmpeg:
    audio:
      loglevel: error
      codec: pcm_s16le
      sample_rate_hz: 16000
      channels: 1
      container: wav
    video:
      compress:
        vcodec: libx264
        preset: fast
        max_width: 1280
        fps: 24
        audio_codec: aac
        audio_bitrate: 128k
        size_headroom_ratio: 0.9
      compress_aggressive:
        vcodec: libx264
        preset: slow
        fps: 24
        audio_codec: aac
        audio_bitrate: 96k
        vf: scale='min(1280,iw)':-1:force_original_aspect_ratio=decrease
        maxrate_multiplier: 1.2
        bufsize_multiplier: 2
        size_headroom_ratio: 0.95

name: COD Test Pipeline (High-Fidelity FLAC Extract)
description: Narrow cod-test experiment lane that preserves current repaired runtime behavior while extracting lossless FLAC audio instead of re-encoding to MP3
version: '1.0'
asset:
  inputPath: examples/videos/emotion-tests/cod.mp4
  outputDir: output/cod-test-high-fidelity-flac
  media:
    refs:
      source_video:
        kind: video
        source:
          path: examples/videos/emotion-tests/cod.mp4
        staged:
          url: https://gambit-games-tests.s3.us-east-1.amazonaws.com/peanut-gallery/cod-720p-h264-mp3-optimized.mp4
          urlType: public
        delivery:
          preferredMode: url
          allowedModes:
          - url
          allowFallback: false
        metadata:
          mimeType: video/mp4
benchmark:
  enabled: true
  path: ../benchmarks/fixtures/cod-test/benchmark.json
gather_context:
- server/scripts/get-context/get-dialogue.cjs
- server/scripts/get-context/get-music.cjs
- server/scripts/get-context/get-music-vocals.cjs
- server/scripts/get-context/reconcile-famous-song-phase1.cjs
process:
- server/scripts/process/whole-video-mimo.cjs
report:
- server/scripts/report/metrics.cjs
- server/scripts/report/recommendation.cjs
- server/scripts/report/emotional-analysis.cjs
- server/scripts/report/summary.cjs
- server/scripts/report/final-report.cjs
settings:
  chunk_duration: 8
  max_chunks: 100
  api_request_delay: 500
  phase1:
    dialogue:
      mode: whole_asset
      timing_refinement: disabled
      max_whole_asset_duration_seconds: 180
      fallback_to_chunked: false
      preserve_chunk_plan_metadata: true
  retry_strategy:
    type: exponential-backoff
    config:
      maxRetries: 4
      initialDelayMs: 1000
      maxDelayMs: 10000
      exponentialBase: 2
      jitter: true
  ffmpeg:
    audio:
      loglevel: error
      codec: flac
      sample_rate_hz: 44100
      channels: 2
      container: flac
    video:
      compress:
        vcodec: libx264
        preset: fast
        max_width: 1280
        fps: 24
        audio_codec: aac
        audio_bitrate: 128k
        size_headroom_ratio: 0.9
      compress_aggressive:
        vcodec: libx264
        preset: slow
        fps: 24
        audio_codec: aac
        audio_bitrate: 96k
        vf: scale='min(1280,iw)':-1:force_original_aspect_ratio=decrease
        maxrate_multiplier: 1.2
        bufsize_multiplier: 2
        size_headroom_ratio: 0.95
debug:
  captureRaw: true
recovery:
  deterministic:
    maxAttemptsPerFailure: 2
    maxRepeatedStrategyUsesPerFailure: 1
  ai:
    enabled: true
    lane: structured-output-repair
    adapter: openrouter
    model: google/gemini-3.1-pro-preview
    temperature: 0
    timeoutMs: 987654
    attempts:
      maxPerFailure: 1
      maxPerScriptRun: 1
      maxPerPipelineRun: 3
    budgets:
      maxInputTokens: 131072
      maxOutputTokens: 131072
      maxTotalTokens: 262144
      maxCostUsd: 2.0
tool_variables:
  soulPath: ../cast/impatient-teenager/SOUL.md
  goalPath: ../goals/video-ad-evaluation.md
  file_transfer: base64
  maxFileSize: 10485760
  chunk_strategy:
    type: duration-based
    config:
      chunkDuration: 5
    split:
      enabled: true
      max_splits: 3
      split_factor: 2
  variables:
    lenses:
    - patience
    - boredom
    - excitement
ai:
  dialogue:
    targets:
    - adapter:
        name: openrouter
        model: xiaomi/mimo-v2-omni
        params:
          max_tokens: 232144
          timeoutMs: 987654
          thinking:
            level: high
  music:
    targets:
    - adapter:
        name: openrouter
        model: xiaomi/mimo-v2-omni
        params:
          max_tokens: 232144
          timeoutMs: 987654
          thinking:
            level: high
  music_vocals:
    targets:
    - adapter:
        name: openrouter
        model: xiaomi/mimo-v2-omni
        params:
          max_tokens: 232144
          timeoutMs: 987654
          thinking:
            level: high
  dialogue_stitch:
    targets:
    - adapter:
        name: openrouter
        model: xiaomi/mimo-v2-omni
        params:
          max_tokens: 232144
          timeoutMs: 987654
          thinking:
            level: high
  video:
    targets:
    - adapter:
        name: openrouter
        model: xiaomi/mimo-v2-omni
        params:
          max_tokens: 232144
          timeoutMs: 987654
          thinking:
            level: high
    inputRefs:
    - source_video
  recommendation:
    targets:
    - adapter:
        name: openrouter
        model: xiaomi/mimo-v2-omni
        params:
          max_tokens: 232144
          timeoutMs: 987654
          thinking:
            level: high

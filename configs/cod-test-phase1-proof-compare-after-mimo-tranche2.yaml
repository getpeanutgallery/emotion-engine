name: COD Test Phase 1 Proof Compare After MiMo Tranche 2
description: Bounded Phase 1-only proof lane for hybrid dialogue/music plus visual identity against the cod asset
version: '1.0'

asset:
  inputPath: examples/videos/emotion-tests/cod.mp4
  outputDir: output/cod-test-phase1-proof-compare-after-mimo-tranche2
  media:
    refs:
      source_video:
        kind: video
        source:
          path: examples/videos/emotion-tests/cod.mp4
        staged:
          url: https://gambit-games-tests.s3.us-east-1.amazonaws.com/peanut-gallery/cod-720p-h264-mp3-optimized.mp4
          urlType: public
        delivery:
          preferredMode: url
          allowedModes:
            - url
          allowFallback: false
        metadata:
          mimeType: video/mp4

gather_context:
  - server/scripts/get-context/get-dialogue.cjs
  - server/scripts/get-context/get-music.cjs
  - server/scripts/get-context/get-visual-identity.cjs

process: []
report: []

settings:
  chunk_duration: 8
  max_chunks: 100
  api_request_delay: 250
  audio_base64_max_bytes: 10485760
  audio_base64_headroom_ratio: 0.9
  retry_strategy:
    type: exponential-backoff
    config:
      maxRetries: 3
      initialDelayMs: 1000
      maxDelayMs: 10000
      exponentialBase: 2
      jitter: true
  ffmpeg:
    audio:
      loglevel: error
      codec: libmp3lame
      bitrate: 192k
      sample_rate_hz: 44100
      channels: 2
      container: mp3
    video:
      compress:
        vcodec: libx264
        preset: fast
        max_width: 1280
        fps: 24
        audio_codec: aac
        audio_bitrate: 128k
        size_headroom_ratio: 0.9
      compress_aggressive:
        vcodec: libx264
        preset: slow
        fps: 24
        audio_codec: aac
        audio_bitrate: 96k
        vf: scale='min(1280,iw)':-1:force_original_aspect_ratio=decrease
        maxrate_multiplier: 1.2
        bufsize_multiplier: 2
        size_headroom_ratio: 0.95
  phase1:
    dialogue:
      mode: hybrid
      timing_refinement: chunk_refine
      max_whole_asset_duration_seconds: 180
      fallback_to_chunked: true
      preserve_chunk_plan_metadata: true
    music:
      mode: hybrid
      max_whole_asset_duration_seconds: 180
      analysis_window_seconds: 30
      emit_global_arc: true
      fallback_to_chunked: true
    visual_identity:
      enabled: true

debug:
  captureRaw: true

recovery:
  deterministic:
    maxAttemptsPerFailure: 1
    maxRepeatedStrategyUsesPerFailure: 0
  ai:
    enabled: true
    lane: structured-output-repair
    adapter: openrouter
    model: google/gemini-3.1-pro-preview
    temperature: 0
    timeoutMs: 45000
    attempts:
      maxPerFailure: 1
      maxPerScriptRun: 1
      maxPerPipelineRun: 3
    budgets:
      maxInputTokens: 12000
      maxOutputTokens: 2000
      maxTotalTokens: 14000
      maxCostUsd: 0.25

tool_variables:
  soulPath: ../cast/impatient-teenager/SOUL.md
  goalPath: ../goals/video-ad-evaluation.md
  file_transfer: base64
  maxFileSize: 10485760
  chunk_strategy:
    type: duration-based
    config:
      chunkDuration: 5
    split:
      enabled: true
      max_splits: 3
      split_factor: 2
  variables:
    lenses:
      - patience
      - boredom
      - excitement

ai:
  dialogue:
    retry:
      maxAttempts: 1
      backoffMs: 0
    toolLoop:
      maxTurns: 6
      maxValidatorCalls: 5
    targets:
      - adapter:
          name: xiaomi
          model: mimo-v2-omni
          params:
            max_tokens: 25000
            timeoutMs: 180000
            thinking:
              level: low
  dialogue_stitch:
    targets:
      - adapter:
          name: xiaomi
          model: mimo-v2-omni
          params:
            max_tokens: 25000
            timeoutMs: 180000
            thinking:
              level: low
  music:
    retry:
      maxAttempts: 1
      backoffMs: 0
    toolLoop:
      maxTurns: 3
      maxValidatorCalls: 2
    analysisWindowSeconds: 30
    targets:
      - adapter:
          name: xiaomi
          model: mimo-v2-omni
          params:
            max_tokens: 25000
            timeoutMs: 180000
            thinking:
              level: low
  video:
    inputRefs:
      - source_video
    targets:
      - adapter:
          name: xiaomi
          model: mimo-v2-omni
          params:
            max_tokens: 4000
            timeoutMs: 180000
            temperature: 0.2
            fps: 2
            media_resolution: default
  video_identity:
    retry:
      maxAttempts: 1
      backoffMs: 0
    toolLoop:
      maxTurns: 3
      maxValidatorCalls: 2
    inputRefs:
      - source_video
    targets:
      - adapter:
          name: xiaomi
          model: mimo-v2-omni
          params:
            max_tokens: 4000
            timeoutMs: 180000
            temperature: 0.2
            fps: 2
            media_resolution: default

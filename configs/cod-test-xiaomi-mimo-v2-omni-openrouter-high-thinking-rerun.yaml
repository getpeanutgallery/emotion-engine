name: COD Test Xiaomi MiMo v2 Omni OpenRouter High Thinking Rerun
description: Narrow cod-test Xiaomi MiMo v2 Omni OpenRouter rerun lane using staged public S3 video URL with high thinking across dialogue, music, and whole-video analysis
version: '1.0'

asset:
  inputPath: examples/videos/emotion-tests/cod.mp4
  outputDir: output/cod-test-xiaomi-mimo-v2-omni-openrouter-high-thinking-rerun
  media:
    refs:
      source_video:
        kind: video
        source:
          path: examples/videos/emotion-tests/cod.mp4
        staged:
          url: https://gambit-games-tests.s3.us-east-1.amazonaws.com/peanut-gallery/cod-720p-h264-mp3-optimized.mp4
          urlType: public
        delivery:
          preferredMode: url
          allowedModes:
            - url
          allowFallback: false
        metadata:
          mimeType: video/mp4

gather_context:
  - server/scripts/get-context/get-dialogue.cjs
  - server/scripts/get-context/get-music.cjs
  - server/scripts/get-context/get-music-vocals.cjs

process:
  - server/scripts/process/whole-video-mimo.cjs

report: []

settings:
  api_request_delay: 500
  phase1:
    dialogue:
      mode: whole_asset
      timing_refinement: disabled
      max_whole_asset_duration_seconds: 180
      fallback_to_chunked: false
      preserve_chunk_plan_metadata: true
    music:
      mode: hybrid
      max_whole_asset_duration_seconds: 180
      analysis_window_seconds: 30
      emit_global_arc: true
      fallback_to_chunked: true
  retry_strategy:
    type: exponential-backoff
    config:
      maxRetries: 3
      initialDelayMs: 1000
      maxDelayMs: 10000
      exponentialBase: 2
      jitter: true
  ffmpeg:
    audio:
      loglevel: error
      codec: libmp3lame
      bitrate: 192k
      sample_rate_hz: 44100
      channels: 2
      container: mp3
    video:
      compress:
        vcodec: libx264
        preset: fast
        max_width: 1280
        fps: 24
        audio_codec: aac
        audio_bitrate: 128k
        size_headroom_ratio: 0.9
      compress_aggressive:
        vcodec: libx264
        preset: slow
        fps: 24
        audio_codec: aac
        audio_bitrate: 96k
        vf: scale='min(1280,iw)':-1:force_original_aspect_ratio=decrease
        maxrate_multiplier: 1.2
        bufsize_multiplier: 2
        size_headroom_ratio: 0.95

debug:
  captureRaw: true

recovery:
  deterministic:
    maxAttemptsPerFailure: 1
    maxRepeatedStrategyUsesPerFailure: 0
  ai:
    enabled: true
    lane: structured-output-repair
    adapter: openrouter
    model: google/gemini-3.1-pro-preview
    temperature: 0
    timeoutMs: 45000
    attempts:
      maxPerFailure: 1
      maxPerScriptRun: 1
      maxPerPipelineRun: 3
    budgets:
      maxInputTokens: 12000
      maxOutputTokens: 2000
      maxTotalTokens: 14000
      maxCostUsd: 0.25

tool_variables:
  soulPath: ../cast/impatient-teenager/SOUL.md
  goalPath: ../goals/video-ad-evaluation.md
  variables:
    lenses:
      - patience
      - boredom
      - excitement

ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: xiaomi/mimo-v2-omni
          params:
            max_tokens: 43219
            timeoutMs: 180000
            thinking:
              level: high
  music:
    analysisWindowSeconds: 30
    targets:
      - adapter:
          name: openrouter
          model: xiaomi/mimo-v2-omni
          params:
            max_tokens: 43219
            timeoutMs: 180000
            thinking:
              level: high
  music_vocals:
    analysisWindowSeconds: 30
    targets:
      - adapter:
          name: openrouter
          model: xiaomi/mimo-v2-omni
          params:
            max_tokens: 43219
            timeoutMs: 180000
            thinking:
              level: high
  dialogue_stitch:
    targets:
      - adapter:
          name: openrouter
          model: openai/gpt-5.4
          params:
            max_tokens: 25000
            thinking:
              level: low
  video:
    inputRefs:
      - source_video
    targets:
      - adapter:
          name: openrouter
          model: xiaomi/mimo-v2-omni
          params:
            max_tokens: 4000
            timeoutMs: 180000
            thinking:
              level: high

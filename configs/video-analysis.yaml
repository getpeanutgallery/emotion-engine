name: Full Video Analysis Pipeline
description: Complete emotion analysis with dialogue, music, and video processing
version: '1.0'
asset:
  inputPath: examples/videos/emotion-tests/cod.mp4
  outputDir: output/cod-test
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  music:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  video:
    retry:
      maxAttempts: 2
      backoffMs: 500
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b
  recommendation:
    targets:
      - adapter:
          name: openrouter
          model: openai/gpt-5.4
gather_context:
  - server/scripts/get-context/get-dialogue.cjs
  - server/scripts/get-context/get-music.cjs
process:
  sequential:
    - script: server/scripts/process/video-chunks.cjs
      toolPath: ../tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: ../cast/impatient-teenager/SOUL.md
        goalPath: ../goals/video-ad-evaluation.md
        variables:
          lenses:
            - patience
            - boredom
            - excitement
    - script: server/scripts/process/video-per-second.cjs
      toolPath: ../tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: ../cast/impatient-teenager/SOUL.md
        goalPath: ../goals/video-ad-evaluation.md
        variables:
          lenses:
            - patience
            - boredom
            - excitement
report:
  - server/scripts/report/metrics.cjs
  - server/scripts/report/recommendation.cjs
  - server/scripts/report/emotional-analysis.cjs
  - server/scripts/report/summary.cjs
  - server/scripts/report/final-report.cjs
settings:
  chunk_duration: 8
  max_chunks: 4
  api_request_delay: 1000
  chunk_quality: medium
  music_segment_duration: 30
  retry_strategy:
    type: exponential-backoff
    config:
      maxRetries: 3
      initialDelayMs: 1000
      maxDelayMs: 10000
      exponentialBase: 2
      jitter: true
  ffmpeg:
    audio:
      loglevel: error
      codec: pcm_s16le
      sample_rate_hz: 16000
      channels: 1
      container: wav
    video:
      compress:
        vcodec: libx264
        preset: fast
        max_width: 1280
        fps: 24
        audio_codec: aac
        audio_bitrate: 128k
        size_headroom_ratio: 0.9
      compress_aggressive:
        vcodec: libx264
        preset: slow
        fps: 24
        audio_codec: aac
        audio_bitrate: 96k
        vf: scale='min(1280,iw)':-1:force_original_aspect_ratio=decrease
        maxrate_multiplier: 1.2
        bufsize_multiplier: 2
        size_headroom_ratio: 0.95
debug:
  keepTempFiles: false
  keepProcessedAssets: true
tool_variables:
  soulPath: ../cast/impatient-teenager/SOUL.md
  goalPath: ../goals/video-ad-evaluation.md
  file_transfer:
    strategy: base64
    mimeType: video/mp4
    maxFileSize: 10485760
  chunk_strategy:
    type: duration-based
    config:
      duration: 8
    split:
      enabled: true
      max_splits: 3
      split_factor: 2
  variables:
    lenses:
      - patience
      - boredom
      - excitement

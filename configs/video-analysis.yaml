# Full Video Analysis Pipeline (Sequential)
# This is the default configuration - scripts run one after another

name: "Full Video Analysis Pipeline"
description: "Complete emotion analysis with dialogue, music, and video processing"
version: "1.0"

# Asset configuration (self-contained - no CLI args needed)
asset:
  inputPath: "examples/videos/emotion-tests/cod.mp4"
  outputDir: "output/cod-test"

# AI provider configuration (git-safe - secrets injected via env vars)
ai:
  provider: openrouter
  dialogue:
    model: google/gemini-2.5-flash
  music:
    model: google/gemini-2.5-flash
  video:
    model: qwen/qwen-3.5-397b-a17b
    retry:
      maxAttempts: 2
      backoffMs: 500
      retryOnParseError: true
      retryOnProviderError: true
  # apiKey: NEVER put API keys in YAML - use environment variables
  # baseUrl: Optional custom endpoint

# Phase 1: Gather context from video
gather_context:
  - scripts/get-context/get-dialogue.cjs
  - scripts/get-context/get-music.cjs

# Phase 2: Process video (SEQUENTIAL - default)
# Each script receives output from the previous script
process:
  sequential:
    - script: scripts/process/video-chunks.cjs
      toolPath: tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "cast/impatient-teenager/SOUL.md"
        goalPath: "goals/video-ad-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom
            - excitement
    - script: scripts/process/video-per-second.cjs
      toolPath: tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "cast/impatient-teenager/SOUL.md"
        goalPath: "goals/video-ad-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom
            - excitement

# Phase 3: Generate reports
report:
  - scripts/report/metrics.cjs
  - scripts/report/recommendation.cjs
  - scripts/report/emotional-analysis.cjs
  - scripts/report/summary.cjs
  - scripts/report/final-report.cjs

# Global settings
settings:
  chunk_duration: 8          # seconds per chunk
  max_chunks: 4              # limit chunks for testing
  api_request_delay: 1000    # milliseconds between API calls
  chunk_quality: "medium"    # low|medium|high
  music_segment_duration: 30 # seconds per music analysis segment
  retry_strategy:
    type: "exponential-backoff"  # Options: "none", "fixed-delay", "exponential-backoff", "adaptive"
    config:
      maxRetries: 3
      initialDelayMs: 1000
      maxDelayMs: 10000
      exponentialBase: 2
      jitter: true

# Debug settings (for development/testing)
# When keepTempFiles: true, intermediate files are saved to:
#   - phase1-gather-context/assets/processed/dialogue/<timestamp>/
#   - phase1-gather-context/assets/processed/music/<timestamp>/
#   - phase2-process/assets/processed/chunks/<timestamp>/
# See: docs/DEBUG-CONFIG.md for details
debug:
  keepTempFiles: false       # Keep ffmpeg extracts, chunk files for debugging
  keepProcessedAssets: true  # Copy to assets/processed/

# Tool variables (paths must be absolute or relative to workspace)
tool_variables:
  soulPath: "cast/impatient-teenager/SOUL.md"
  goalPath: "goals/video-ad-evaluation.md"
  
  file_transfer:
    strategy: "base64"       # Options: "base64", "web_url", "youtube_url"
    mimeType: "video/mp4"
    maxFileSize: 10485760    # 10MB in bytes (OpenRouter limit)
  
  chunk_strategy:
    type: "duration-based"   # Options: "duration-based", "size-based", "count-based"
    config:
      duration: 8            # seconds (for duration-based)
    
    split:
      enabled: true
      max_splits: 3          # Recursive split limit (configurable)
      split_factor: 2        # Divide chunk duration by this factor each split
  
  variables:
    lenses:
      - patience
      - boredom
      - excitement


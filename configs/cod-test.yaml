# Quick Test Pipeline - cod.mp4
# Minimal pipeline for testing with cod.mp4 video

name: "COD Test Pipeline"
description: "Test pipeline for cod.mp4 video (2 chunks max)"
version: "1.0"

# Asset configuration
asset:
  inputPath: "examples/videos/emotion-tests/cod.mp4"
  outputDir: "output/cod-test"

# Gather context for comprehensive evaluation
gather_context:
  - server/scripts/get-context/get-dialogue.cjs
  - server/scripts/get-context/get-music.cjs

# Process with video-chunks
process:
  - server/scripts/process/video-chunks.cjs

# Generate reports
report:
  - server/scripts/report/metrics.cjs
  - server/scripts/report/recommendation.cjs
  - server/scripts/report/emotional-analysis.cjs
  - server/scripts/report/summary.cjs
  - server/scripts/report/final-report.cjs

# Settings for full evaluation
settings:
  chunk_duration: 8
  max_chunks: 100  # Process all chunks (high limit)
  api_request_delay: 500
  retry_strategy:
    type: "exponential-backoff"  # Options: "none", "fixed-delay", "exponential-backoff", "adaptive"
    config:
      maxRetries: 3
      initialDelayMs: 1000
      maxDelayMs: 10000
      exponentialBase: 2
      jitter: true

debug:
  captureRaw: true

recovery:
  deterministic:
    maxAttemptsPerFailure: 2
    maxRepeatedStrategyUsesPerFailure: 1
  ai:
    enabled: true
    lane: structured-output-repair
    adapter: openrouter
    model: google/gemini-3.1-pro-preview
    temperature: 0
    timeoutMs: 45000
    attempts:
      maxPerFailure: 1
      maxPerScriptRun: 1
      maxPerPipelineRun: 3
    budgets:
      maxInputTokens: 12000
      maxOutputTokens: 2000
      maxTotalTokens: 14000
      maxCostUsd: 0.25

# Tool variables (paths should be absolute or relative to ../tools)
tool_variables:
  soulPath: "../cast/impatient-teenager/SOUL.md"
  goalPath: "../goals/video-ad-evaluation.md"
  
  file_transfer: "base64"  # Options: "base64", "web_url", "youtube_url"
  maxFileSize: 10485760    # 10MB in bytes (OpenRouter limit)
  
  chunk_strategy:
    type: "duration-based"   # Options: "duration-based", "size-based", "count-based"
    config:
      chunkDuration: 5       # seconds (for duration-based) - small for testing
    
    split:
      enabled: true
      max_splits: 3          # Recursive split limit (configurable)
      split_factor: 2        # Divide chunk duration by this factor each split
  
  variables:
    lenses:
      - patience
      - boredom
      - excitement

# AI provider configuration (API key injected via environment)
ai:

# Quick Test Pipeline - cod.mp4
# Minimal pipeline for testing with cod.mp4 video

name: "COD Test Pipeline"
description: "Test pipeline for cod.mp4 video (2 chunks max)"
version: "1.0"

# Asset configuration
asset:
  inputPath: ".cache/videos/cod.mp4"
  outputDir: "output/cod-test"

# Skip context gathering for speed
gather_context: []

# Process with video-chunks (limited to 2 chunks for fast testing)
process:
  - server/scripts/process/video-chunks.cjs

# Generate reports
report:
  - server/scripts/report/metrics.cjs
  - server/scripts/report/recommendation.cjs
  - server/scripts/report/emotional-analysis.cjs
  - server/scripts/report/summary.cjs
  - server/scripts/report/final-report.cjs

# Settings for quick testing
settings:
  chunk_duration: 8
  max_chunks: 2  # Only 2 chunks for fast testing
  api_request_delay: 500
  retry_strategy:
    type: "exponential-backoff"  # Options: "none", "fixed-delay", "exponential-backoff", "adaptive"
    config:
      maxRetries: 3
      initialDelayMs: 1000
      maxDelayMs: 10000
      exponentialBase: 2
      jitter: true

# Tool variables (use persona IDs, not full paths)
tool_variables:
  soulId: "impatient-teenager"
  goalId: "video-ad-evaluation"
  
  file_transfer: "base64"  # Options: "base64", "web_url", "youtube_url"
  maxFileSize: 10485760    # 10MB in bytes (OpenRouter limit)
  
  chunk_strategy:
    type: "duration-based"   # Options: "duration-based", "size-based", "count-based"
    config:
      chunkDuration: 5       # seconds (for duration-based) - small for testing
    
    split:
      enabled: true
      max_splits: 3          # Recursive split limit (configurable)
      split_factor: 2        # Divide chunk duration by this factor each split
  
  variables:
    lenses:
      - patience
      - boredom
      - excitement

# AI provider configuration (API key injected via environment)
ai:
  provider: openrouter
  model: qwen/qwen3.5-27b
  # apiKey: injected via AI_API_KEY environment variable

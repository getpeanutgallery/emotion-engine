# Test Model Loading from YAML
# This config tests if models are loaded from YAML, not env vars

name: "Test Model Loading"
description: "Verify models load from YAML config, not env vars"
version: "1.0"

asset:
  inputPath: "examples/videos/emotion-tests/cod.mp4"
  outputDir: "output/test-model-loading"

# AI configuration - this SHOULD be used by the code
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  music:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  video:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash

gather_context:
  - server/scripts/get-context/get-dialogue.cjs

# Skip processing for this test
process: []

# Simple report (legacy evaluation wrapper)
report:
  - server/scripts/report/evaluation.cjs

settings:
  api_request_delay: 1000

debug:
  keepTempFiles: false
  keepProcessedAssets: true

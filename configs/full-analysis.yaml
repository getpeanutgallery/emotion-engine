# Full Analysis Pipeline Configuration
# Complete emotion analysis with dialogue, music, and video processing

name: "Full Video Analysis Pipeline"
description: "Complete emotion analysis with dialogue, music, and video processing"
version: "1.0"

# Asset configuration
asset:
  inputPath: ".cache/videos/test-video.mp4"
  outputDir: "output/full-analysis"

# Gather context from video (dialogue and music)
gather_context:
  - scripts/get-context/get-dialogue.cjs
  - scripts/get-context/get-music.cjs

# Process video with emotion analysis
process:
  sequential:
    - script: scripts/process/video-chunks.cjs
      toolPath: tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "cast/impatient-teenager/SOUL.md"
        goalPath: "goals/video-ad-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom
            - excitement
    - script: scripts/process/video-per-second.cjs

# Generate comprehensive report
report:
  - scripts/report/evaluation.cjs

# Settings
settings:
  chunk_duration: 8
  max_chunks: 10  # Analyze up to 10 chunks (80 seconds of video)
  api_request_delay: 1000
  chunk_quality: "medium"
  music_segment_duration: 30

# Tool variables
tool_variables:
  soulPath: "cast/impatient-teenager/SOUL.md"
  goalPath: "goals/video-ad-evaluation.md"
  variables:
    lenses:
      - patience
      - boredom
      - excitement

# AI provider configuration

ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  music:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  video:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b

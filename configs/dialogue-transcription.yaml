# Dialogue Transcription Pipeline
# Transcribe audio and generate a simple report (no persona evaluation)

name: "Dialogue Transcription Pipeline"
description: "Transcribe audio and generate a simple report (no persona evaluation)"
version: "1.0"

# Asset configuration (self-contained - no CLI args needed)
asset:
  inputPath: ".cache/audio/meeting.mp3"
  outputDir: "output/transcription"

# AI provider configuration (git-safe - secrets injected via env vars)
ai:
  dialogue:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  music:
    targets:
      - adapter:
          name: openrouter
          model: google/gemini-2.5-flash
  video:
    targets:
      - adapter:
          name: openrouter
          model: qwen/qwen-3.5-397b-a17b

# Gather dialogue from audio/video
gather_context:
  - server/scripts/get-context/get-dialogue.cjs

# Skip persona-based processing
process: []

# Generate a basic report (includes dialogueData if present)
report:
  - server/scripts/report/evaluation.cjs

# Global settings
settings:
  api_request_delay: 1000

# Use case: Transcribe meetings, interviews, or podcasts without persona evaluation.

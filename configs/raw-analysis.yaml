# Raw Analysis Pipeline
# Run analysis and output raw JSON (no context gathering, no report)

name: "Raw Analysis Pipeline"
description: "Run analysis and output raw JSON (no context gathering, no report)"
version: "1.0"

# Asset configuration (self-contained - no CLI args needed)
asset:
  inputPath: "examples/videos/emotion-tests/cod.mp4"
  outputDir: "output/raw-test"

# AI provider configuration (git-safe - secrets injected via env vars)
ai:
  provider: openrouter
  model: qwen/qwen-3.5-397b-a17b

# Skip context gathering
gather_context: []

# Run analysis only
process:
  sequential:
    - script: scripts/process/video-chunks.cjs
      toolPath: tools/emotion-lenses-tool.cjs
      tool_variables:
        soulPath: "personas/impatient-teenager.md"
        goalPath: "goals/video-ad-evaluation.md"
        variables:
          lenses:
            - patience
            - boredom
            - excitement

# Skip report generation (raw JSON output only)
report: []

# Global settings
settings:
  chunk_duration: 8
  max_chunks: 4
  api_request_delay: 1000

# Use case: Generate raw analysis data for downstream processing,
# integration with other tools, or custom reporting pipelines.

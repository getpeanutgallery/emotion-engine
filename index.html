<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenTruth Emotion Engine</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/variables.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🎬 OpenTruth Emotion Engine</h1>
            <p class="tagline">AI-powered video validation with synthetic personas</p>
        </header>

        <main>
            <!-- Video Upload Section -->
            <section id="upload-section">
                <video-upload></video-upload>
            </section>

            <!-- Persona Selection -->
            <section id="persona-section" hidden>
                <h2>Select Persona</h2>
                <persona-selector></persona-selector>
            </section>

            <!-- Analysis Progress -->
            <section id="progress-section" hidden>
                <h2>Analysis Progress</h2>
                <analysis-progress></analysis-progress>
            </section>

            <!-- Results Dashboard -->
            <section id="results-section" hidden>
                <h2>Results</h2>
                <div class="dashboard">
                    <radar-chart></radar-chart>
                    <emotion-timeline></emotion-timeline>
                    <friction-index></friction-index>
                    <recommendations></recommendations>
                </div>
            </section>
        </main>

        <footer>
            <p>OpenTruth Emotion Engine v0.2.0 — Gambit Games LLC</p>
        </footer>
    </div>

    <!-- Load Managers First -->
    <script type="module" src="managers/api-manager.js"></script>
    <script type="module" src="managers/state-manager.js"></script>
    <script type="module" src="managers/ui-manager.js"></script>

    <!-- Load Web Components -->
    <script type="module" src="components/video-upload.js"></script>
    <script type="module" src="components/persona-selector.js"></script>
    <script type="module" src="components/analysis-progress.js"></script>
    <script type="module" src="components/radar-chart.js"></script>
    <script type="module" src="components/emotion-timeline.js"></script>
    <script type="module" src="components/friction-index.js"></script>
    <script type="module" src="components/recommendations.js"></script>

    <!-- Load App Bootstrap -->
    <script type="module" src="index.js"></script>
</body>
</html>
